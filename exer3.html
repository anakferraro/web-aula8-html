<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS - Exercício 3</title>
    <style>
        h1 { color: lightgreen; }
    </style>
    <script>
        let memoria = null;

        window.onload = inicio;

        function inicio() {
            document.getElementById('btn_guardar').addEventListener('click', guardar);
            document.getElementById('btn_adicionar').addEventListener('click', adicionar);
            document.getElementById('btn_reduzir').addEventListener('click', reduzir);
            document.getElementById('btn_limpar').addEventListener('click', limpar);
        }

        function getValor() {
            let digitado = document.getElementById('numero').value;
            return parseInt(digitado);
        }

        function atualizar(msg) {
            document.getElementById('saida').innerHTML =
                `Memória: ${memoria} | ${msg}`;
        }

        function guardar() {
            memoria = getValor();
            atualizar(`Valor ${memoria} guardado na memória.`);
        }

        function adicionar() {
            let valor = getValor();
            memoria = memoria + valor;
            atualizar(`Adicionado ${valor}. Novo valor: ${memoria}`);
        }

        function reduzir() {
            let valor = getValor();
            memoria = memoria - valor;
            atualizar(`Reduzido ${valor}. Novo valor: ${memoria}`);
        }

        function limpar() {
            memoria = null;
            atualizar('Memória limpa.');
        }
    </script>
</head>
<body>
    <h1>Aprendendo JS</h1>
    <label for="numero">Valor:</label>
    <input type="number" id="numero">
    <br><br>
    <button id="btn_guardar">Guardar na memória</button>
    <button id="btn_adicionar">Adicionar à memória</button>
    <button id="btn_reduzir">Reduzir da memória</button>
    <button id="btn_limpar">Limpar memória</button>
    <p id="saida"></p>
</body>
</html>
</html>
